<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TG Files — Review</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --accent:       #2563eb;
  --accent-hover: #1d4ed8;
  --accent-light: #dbeafe;
  --danger:       #dc2626;
  --danger-hover: #b91c1c;
  --bg:           #f1f5f9;
  --surface:      #ffffff;
  --border:       #e2e8f0;
  --text:         #1e293b;
  --muted:        #64748b;
  --shadow:       0 1px 3px rgba(0,0,0,.10), 0 1px 2px rgba(0,0,0,.06);
  --shadow-lg:    0 4px 8px rgba(0,0,0,.08), 0 2px 4px rgba(0,0,0,.05);
}

body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
}

/* ── Header ── */
.header {
  position: sticky; top: 0; z-index: 100;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  padding: 10px 14px;
  display: flex; align-items: center; gap: 8px;
}
.brand { font-weight: 700; font-size: 1rem; color: var(--accent); white-space: nowrap; flex-shrink: 0; }

.header select {
  flex: 1; min-width: 0;
  padding: 7px 10px; border: 1px solid var(--border); border-radius: 6px;
  background: var(--surface); font-size: .875rem; cursor: pointer;
}
.header select:focus { outline: none; border-color: var(--accent); }

/* desktop-only actions in header */
.header-actions {
  display: none;
  align-items: center; gap: 8px; flex-shrink: 0;
}
@media (min-width: 640px) {
  .header-actions { display: flex; }
}

.btn {
  padding: 7px 14px; border: 1px solid var(--border); border-radius: 6px;
  background: var(--surface); font-size: .875rem; cursor: pointer;
  transition: background .15s, border-color .15s, opacity .15s;
  white-space: nowrap; font-family: inherit; touch-action: manipulation;
}
.btn:hover:not(:disabled) { background: var(--bg); }
.btn:active:not(:disabled) { opacity: .75; }
.btn:disabled { opacity: .4; cursor: not-allowed; }
.btn-primary { background: var(--accent); color: #fff; border-color: var(--accent); }
.btn-primary:hover:not(:disabled) { background: var(--accent-hover); border-color: var(--accent-hover); }
.btn-danger  { background: var(--danger);  color: #fff; border-color: var(--danger); }
.btn-danger:hover:not(:disabled)  { background: var(--danger-hover);  border-color: var(--danger-hover); }

.sel-badge {
  display: none; padding: 4px 10px; background: var(--accent-light);
  color: var(--accent); border-radius: 20px; font-size: .8rem; font-weight: 600;
  white-space: nowrap;
}
.sel-badge.visible { display: inline-block; }

/* ── Mobile bottom action bar ── */
.mob-bar {
  display: none;
  position: fixed; bottom: 0; left: 0; right: 0; z-index: 200;
  background: var(--surface); border-top: 2px solid var(--accent);
  padding: 10px 14px; gap: 8px; align-items: center;
  box-shadow: 0 -2px 10px rgba(0,0,0,.12);
}
.mob-bar-count {
  font-size: .85rem; font-weight: 600; color: var(--accent);
  flex-shrink: 0;
}
.mob-bar .spacer { flex: 1; }
@media (max-width: 639px) {
  .mob-bar.visible { display: flex; }
  /* push grid content above the fixed bar */
  .main { padding-bottom: 72px; }
}

/* ── Main ── */
.main { padding: 12px 14px; max-width: 1600px; margin: 0 auto; }

.grid-meta { font-size: .78rem; color: var(--muted); margin-bottom: 10px; min-height: 1.1em; }

.grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(148px, 1fr));
  gap: 12px;
}
@media (min-width: 480px) {
  .grid { grid-template-columns: repeat(auto-fill, minmax(165px, 1fr)); gap: 14px; }
}
@media (min-width: 900px) {
  .grid { grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); }
}

/* ── Card ── */
.card {
  background: var(--surface); border-radius: 10px; box-shadow: var(--shadow);
  overflow: hidden; cursor: pointer; position: relative;
  border: 2px solid transparent;
  transition: box-shadow .15s, border-color .12s;
  user-select: none; touch-action: manipulation;
  -webkit-tap-highlight-color: transparent;
}
/* hover lift only on pointer devices */
@media (hover: hover) {
  .card:hover { box-shadow: var(--shadow-lg); }
}
.card:active { opacity: .9; }
.card.selected { border-color: var(--accent); }

/* cover — portrait aspect */
.cover {
  position: relative; width: 100%; padding-top: 137%;
  background: linear-gradient(160deg, #e2e8f0, #cbd5e1);
  overflow: hidden;
}
.cover img {
  position: absolute; inset: 0; width: 100%; height: 100%;
  object-fit: cover; opacity: 0; transition: opacity .25s;
}
.cover img.loaded { opacity: 1; }

.cover-placeholder {
  position: absolute; inset: 0;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  gap: 6px; pointer-events: none;
}
.cover-placeholder .icon { font-size: 2.2rem; line-height: 1; }
.cover-placeholder .ext {
  font-size: .62rem; font-weight: 700; text-transform: uppercase;
  letter-spacing: .08em; color: var(--muted);
}

.cover-check {
  position: absolute; top: 7px; right: 7px;
  width: 24px; height: 24px; border-radius: 50%;
  background: var(--accent); color: #fff; font-size: .8rem; font-weight: 700;
  display: none; align-items: center; justify-content: center;
  box-shadow: 0 1px 4px rgba(0,0,0,.3); pointer-events: none;
}
.card.selected .cover-check { display: flex; }
.card.selected .cover::after {
  content: ''; position: absolute; inset: 0;
  background: rgba(37,99,235,.09); pointer-events: none;
}

/* info strip */
.info { padding: 8px 9px 9px; display: flex; flex-direction: column; gap: 2px; }
.info-name {
  font-size: .76rem; font-weight: 600; color: var(--text);
  overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
}
.info-channel {
  font-size: .68rem; color: var(--accent);
  overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
}
.info-meta { font-size: .66rem; color: var(--muted); }

.lang-badge {
  display: inline-block; padding: 1px 5px; border-radius: 3px;
  font-size: .6rem; font-weight: 700; text-transform: uppercase; letter-spacing: .05em;
  background: #e2e8f0; color: #475569;
}
.lang-badge[data-lang="en"] { background: #dbeafe; color: #1d4ed8; }
.lang-badge[data-lang="fr"] { background: #ede9fe; color: #6d28d9; }
.lang-badge[data-lang="es"] { background: #ffedd5; color: #c2410c; }
.lang-badge[data-lang="it"] { background: #dcfce7; color: #15803d; }
.lang-badge[data-lang="pt"] { background: #fef9c3; color: #a16207; }
.lang-badge[data-lang="ru"] { background: #fee2e2; color: #b91c1c; }
.lang-badge[data-lang="nl"] { background: #fef3c7; color: #d97706; }
.lang-badge[data-lang="pl"] { background: #fce7f3; color: #be185d; }
.btn-dl {
  display: block; margin-top: 7px; padding: 7px 5px; text-align: center;
  font-size: .72rem; border: 1px solid var(--border); border-radius: 5px;
  color: var(--text); text-decoration: none; background: var(--bg);
  transition: background .15s; touch-action: manipulation;
  -webkit-tap-highlight-color: transparent;
}
.btn-dl:hover { background: #e2e8f0; }
.btn-dl:active { opacity: .7; }

.dupe-badge {
  display: inline-block; padding: 1px 5px; border-radius: 3px;
  font-size: .6rem; font-weight: 700; letter-spacing: .03em;
  background: #fef3c7; color: #92400e;
}
.btn.active { background: var(--accent-light); border-color: var(--accent); color: var(--accent); }

/* ── Pagination ── */
.pagination {
  display: flex; align-items: center; justify-content: center;
  gap: 10px; padding: 24px 0; flex-wrap: wrap;
}
.page-label { font-size: .875rem; color: var(--muted); }

/* ── States ── */
.empty, .loading-msg {
  grid-column: 1 / -1; text-align: center; padding: 80px 20px; color: var(--muted);
}
.empty h2, .loading-msg h2 { font-size: 1.1rem; margin-bottom: 6px; }
.empty p,  .loading-msg p  { font-size: .875rem; }

/* ── Toast ── */
.toast {
  position: fixed; bottom: 24px; left: 50%;
  transform: translateX(-50%) translateY(80px);
  background: #1e293b; color: #fff; padding: 11px 22px; border-radius: 8px;
  font-size: .875rem; z-index: 500; transition: transform .28s ease;
  pointer-events: none; white-space: nowrap; box-shadow: var(--shadow-lg);
}
.toast.show { transform: translateX(-50%) translateY(0); }
@media (max-width: 639px) {
  /* push toast above the mobile action bar */
  .toast { bottom: 80px; }
}

/* RAG search panel */
.rag-panel {
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  padding: 10px 14px;
}
.rag-bar { display: flex; gap: 8px; align-items: center; }
.rag-input {
  flex: 1; padding: 8px 12px;
  border: 1px solid var(--border); border-radius: 6px;
  font-size: .875rem; font-family: inherit; background: var(--bg);
}
.rag-input:focus { outline: none; border-color: var(--accent); }
.rag-results { margin-top: 10px; display: flex; flex-direction: column; gap: 8px; }
.rag-chunk {
  background: var(--bg); border: 1px solid var(--border);
  border-radius: 8px; padding: 10px 12px;
}
.rag-chunk-source {
  font-size: .73rem; font-weight: 600; color: var(--accent);
  margin-bottom: 4px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
}
.rag-chunk-text {
  font-size: .8rem; color: var(--text); line-height: 1.5;
  max-height: 72px; overflow: hidden;
}
.rag-answer {
  background: var(--accent-light); border: 1px solid var(--accent);
  border-radius: 8px; padding: 12px 14px;
}
.rag-answer-label { font-size: .73rem; font-weight: 700; color: var(--accent); margin-bottom: 6px; }
.rag-answer-text { font-size: .85rem; color: var(--text); line-height: 1.6; white-space: pre-wrap; }
</style>
</head>
<body>

<header class="header">
  <span class="brand">TG Files</span>
  <select id="ch-filter" title="Filter by channel" style="flex:1.5"></select>
  <select id="lang-filter" title="Filter by language" style="flex:1"></select>
  <div class="header-actions">
    <button id="btn-dupes" class="btn active" onclick="toggleDupes()" title="Toggle duplicate copies">Hide dupes</button>
    <button class="btn" onclick="selectAll()">Select All</button>
    <button class="btn" onclick="clearAll()">Clear</button>
    <span id="sel-badge" class="sel-badge"></span>
    <button id="btn-del" class="btn btn-danger" onclick="deleteSelected()" disabled>Delete Selected</button>
  </div>
</header>

<div class="rag-panel">
  <div class="rag-bar">
    <input id="rag-input" type="search" class="rag-input"
           placeholder="Search your library..."
           autocomplete="off"
           onkeydown="if(event.key==='Enter')ragSearch()">
    <button class="btn" onclick="ragSearch()">Search</button>
    <button class="btn btn-primary" onclick="ragAsk()">Ask AI</button>
  </div>
  <div id="rag-results" class="rag-results" style="display:none"></div>
</div>

<!-- mobile bottom bar, shown only when items are selected -->
<div id="mob-bar" class="mob-bar">
  <span id="mob-count" class="mob-bar-count"></span>
  <div class="spacer"></div>
  <button class="btn" onclick="selectAll()">All</button>
  <button class="btn" onclick="clearAll()">Clear</button>
  <button class="btn btn-danger" onclick="deleteSelected()">Delete</button>
</div>

<main class="main">
  <div id="grid-meta" class="grid-meta"></div>
  <div id="grid" class="grid">
    <div class="loading-msg"><h2>Loading…</h2></div>
  </div>
  <div id="pagination" class="pagination"></div>
</main>

<div id="toast" class="toast"></div>

<script>
/* ── State ── */
const S = { files: [], total: 0, page: 1, perPage: 60, channel: '', language: '', hideDupes: true, selected: new Set() };

const LANG_NAMES = {
  af:'Afrikaans', ar:'Arabic', bg:'Bulgarian', ca:'Catalan', cs:'Czech',
  da:'Danish', de:'Deutsch', el:'Greek', en:'English', es:'Español',
  et:'Estonian', fa:'Persian', fi:'Finnish', fr:'Français', hr:'Croatian',
  hu:'Hungarian', id:'Indonesian', it:'Italiano', ja:'Japanese', ko:'Korean',
  lt:'Lithuanian', lv:'Latvian', mk:'Macedonian', ms:'Malay', nl:'Nederlands',
  no:'Norwegian', pl:'Polski', pt:'Português', ro:'Romanian', ru:'Русский',
  sk:'Slovak', sl:'Slovenian', sq:'Albanian', sr:'Serbian', sv:'Swedish',
  th:'Thai', tl:'Filipino', tr:'Turkish', uk:'Ukrainian', vi:'Vietnamese',
  zh:'Chinese', '__unknown__':'Unknown',
};

/* ── Lazy thumbnail observer ── */
const thumbObs = new IntersectionObserver(entries => {
  for (const e of entries) {
    if (!e.isIntersecting) continue;
    const img = e.target;
    img.src = `/api/thumb/${img.dataset.id}`;
    img.onload  = () => { img.classList.add('loaded'); img.closest('.cover')?.querySelector('.cover-placeholder')?.remove(); };
    img.onerror = () => img.remove();
    thumbObs.unobserve(img);
  }
}, { rootMargin: '400px' });

/* -- RAG search/ask -- */
function _ragStatus(el, msg) {
  el.style.display = 'block';
  const p = document.createElement('p');
  p.style.cssText = 'color:var(--muted);font-size:.85rem;padding:4px 0';
  p.textContent = msg;
  el.replaceChildren(p);
}

function _ragError(el, msg) {
  el.style.display = 'block';
  const p = document.createElement('p');
  p.style.cssText = 'color:var(--danger);font-size:.85rem';
  p.textContent = msg;
  el.replaceChildren(p);
}

function _renderRagResults(chunks, container, answer) {
  container.replaceChildren();
  container.style.display = 'block';
  if (answer) {
    const box = document.createElement('div');
    box.className = 'rag-answer';
    const lbl = document.createElement('div');
    lbl.className = 'rag-answer-label';
    lbl.textContent = 'Answer';
    const txt = document.createElement('div');
    txt.className = 'rag-answer-text';
    txt.textContent = answer;
    box.appendChild(lbl);
    box.appendChild(txt);
    container.appendChild(box);
  }
  if (!chunks.length) {
    const p = document.createElement('p');
    p.style.cssText = 'color:var(--muted);font-size:.85rem;padding:4px 0';
    p.textContent = 'No matching content found.';
    container.appendChild(p);
    return;
  }
  for (const chunk of chunks) {
    const div = document.createElement('div');
    div.className = 'rag-chunk';
    const src = document.createElement('div');
    src.className = 'rag-chunk-source';
    const loc = chunk.page != null ? 'p. ' + chunk.page : (chunk.chapter || '');
    src.textContent = chunk.filename + (loc ? ' — ' + loc : '');
    const txt = document.createElement('div');
    txt.className = 'rag-chunk-text';
    txt.textContent = chunk.text;
    div.appendChild(src);
    div.appendChild(txt);
    container.appendChild(div);
  }
}

async function ragSearch() {
  const q = document.getElementById('rag-input').value.trim();
  if (!q) return;
  const el = document.getElementById('rag-results');
  _ragStatus(el, 'Searching...');
  try {
    const data = await fetch(
      '/api/rag/search?' + new URLSearchParams({ q, channel: S.channel || '' })
    ).then(r => r.json());
    _renderRagResults(data.chunks || [], el, null);
  } catch {
    _ragError(el, 'Search failed. Check server logs.');
  }
}

async function ragAsk() {
  const q = document.getElementById('rag-input').value.trim();
  if (!q) return;
  const el = document.getElementById('rag-results');
  _ragStatus(el, 'Generating answer...');
  try {
    const data = await fetch('/api/rag/ask', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ query: q, channel: S.channel || '' }),
    }).then(r => r.json());
    _renderRagResults(data.chunks || [], el, data.answer || null);
  } catch {
    _ragError(el, 'Ask failed. Is Ollama running?');
  }
}

/* ── Boot ── */
async function init() {
  const chSel   = document.getElementById('ch-filter');
  const langSel = document.getElementById('lang-filter');

  // Reset selects (static strings only — not user data)
  while (chSel.firstChild)   chSel.removeChild(chSel.firstChild);
  while (langSel.firstChild) langSel.removeChild(langSel.firstChild);
  const mkOpt = (val, label, sel) => { const o = document.createElement('option'); o.value = val; o.textContent = label; sel.appendChild(o); };
  mkOpt('', 'All channels',   chSel);
  mkOpt('', 'All languages', langSel);

  try {
    const [channels, languages] = await Promise.all([
      fetch('/api/channels').then(r => r.json()),
      fetch('/api/languages').then(r => r.json()),
    ]);
    for (const ch of channels)
      mkOpt(ch.identifier, `${ch.title} (${ch.count})`, chSel);
    for (const l of languages)
      mkOpt(l.language, `${LANG_NAMES[l.language] || l.language.toUpperCase()} (${l.count})`, langSel);
  } catch { /* non-fatal */ }

  chSel.addEventListener('change',   e => { S.channel  = e.target.value; S.page = 1; S.selected.clear(); load(); });
  langSel.addEventListener('change', e => { S.language = e.target.value; S.page = 1; S.selected.clear(); load(); });
  await load();
}

/* ── Dupes toggle ── */
function toggleDupes() {
  S.hideDupes = !S.hideDupes;
  S.page = 1; S.selected.clear();
  const btn = document.getElementById('btn-dupes');
  btn.textContent = S.hideDupes ? 'Hide dupes' : 'Show dupes';
  btn.classList.toggle('active', S.hideDupes);
  load();
}

/* ── Data ── */
async function load() {
  document.getElementById('grid').innerHTML = '<div class="loading-msg"><h2>Loading…</h2></div>';
  const qs = new URLSearchParams({ page: S.page, per_page: S.perPage, channel: S.channel, language: S.language, hide_dupes: S.hideDupes });
  try {
    const d = await fetch(`/api/files?${qs}`).then(r => r.json());
    S.files = d.items; S.total = d.total;
    renderGrid(); renderPagination(); syncUI();
  } catch {
    document.getElementById('grid').innerHTML = '<div class="empty"><h2>Failed to load</h2><p>Check server logs.</p></div>';
  }
}

/* ── Grid ── */
function renderGrid() {
  const grid = document.getElementById('grid');
  const meta = document.getElementById('grid-meta');
  if (!S.files.length) {
    grid.innerHTML = '<div class="empty"><h2>No downloaded files</h2><p>Files will appear here once downloaded.</p></div>';
    meta.textContent = '';
    return;
  }
  const start = (S.page - 1) * S.perPage + 1;
  const end   = start + S.files.length - 1;
  meta.textContent = `Showing ${start}–${end} of ${S.total.toLocaleString()} files`;
  grid.innerHTML = '';
  S.files.forEach(f => grid.appendChild(makeCard(f)));
}

function makeCard(f) {
  const card = document.createElement('div');
  card.className = 'card' + (S.selected.has(f.id) ? ' selected' : '');
  card.dataset.id = f.id;

  const ext  = (f.ext || '').toLowerCase();
  const icon = EXT_ICON[ext] || '📁';
  const size = fmtSize(f.size || 0);
  const date = (f.downloaded_at || f.date || '').slice(0, 10);
  const lang = f.language || null;
  const langLabel = lang ? (LANG_NAMES[lang] || lang.toUpperCase()) : null;

  // Build card using DOM methods to avoid any XSS risk with user-controlled filenames
  const cover = document.createElement('div'); cover.className = 'cover';
  const ph = document.createElement('div'); ph.className = 'cover-placeholder';
  const iconSpan = document.createElement('span'); iconSpan.className = 'icon'; iconSpan.textContent = icon;
  const extSpan  = document.createElement('span'); extSpan.className  = 'ext';  extSpan.textContent = ext || 'file';
  ph.appendChild(iconSpan); ph.appendChild(extSpan);
  const img = document.createElement('img'); img.dataset.id = f.id; img.alt = '';
  const chk = document.createElement('div'); chk.className = 'cover-check'; chk.textContent = '✓';
  cover.appendChild(ph); cover.appendChild(img); cover.appendChild(chk);

  const info = document.createElement('div'); info.className = 'info';
  const name = document.createElement('div'); name.className = 'info-name'; name.title = f.filename || ''; name.textContent = f.filename || '';
  const chan = document.createElement('div'); chan.className = 'info-channel'; chan.title = f.channel_title || ''; chan.textContent = f.channel_title || '';
  const meta = document.createElement('div'); meta.className = 'info-meta'; meta.textContent = size + (date ? ' · ' + date : '');
  const dl   = document.createElement('a');   dl.className   = 'btn-dl'; dl.href = `/api/download/${f.id}`; dl.textContent = '⬇ Download'; dl.download = ''; dl.addEventListener('click', e => e.stopPropagation());
  info.appendChild(name); info.appendChild(chan);
  const badges = document.createElement('div');
  badges.style.cssText = 'display:flex;gap:4px;flex-wrap:wrap;margin-top:2px;';
  if (lang) {
    const badge = document.createElement('span');
    badge.className = 'lang-badge'; badge.dataset.lang = lang;
    badge.title = langLabel; badge.textContent = lang.toUpperCase();
    badges.appendChild(badge);
  }
  if ((f.copy_count || 1) > 1) {
    const dupeBadge = document.createElement('span');
    dupeBadge.className = 'dupe-badge';
    dupeBadge.title = `${f.copy_count} copies across channels`;
    dupeBadge.textContent = `${f.copy_count}×`;
    badges.appendChild(dupeBadge);
  }
  if (badges.firstChild) info.appendChild(badges);
  info.appendChild(meta); info.appendChild(dl);

  card.appendChild(cover); card.appendChild(info);

  thumbObs.observe(img);
  card.addEventListener('click', e => { if (!e.target.closest('.btn-dl')) toggleCard(f.id, card); });
  return card;
}

/* ── Selection ── */
function toggleCard(id, el) {
  S.selected.has(id) ? (S.selected.delete(id), el.classList.remove('selected'))
                     : (S.selected.add(id),    el.classList.add('selected'));
  syncUI();
}
function selectAll() {
  S.files.forEach(f => { S.selected.add(f.id); document.querySelector(`.card[data-id="${f.id}"]`)?.classList.add('selected'); });
  syncUI();
}
function clearAll() {
  S.selected.clear();
  document.querySelectorAll('.card.selected').forEach(c => c.classList.remove('selected'));
  syncUI();
}
function syncUI() {
  const n = S.selected.size;

  // desktop badge + button
  const badge = document.getElementById('sel-badge');
  badge.textContent = `${n} selected`;
  badge.classList.toggle('visible', n > 0);
  document.getElementById('btn-del').disabled = n === 0;

  // mobile bottom bar
  const bar = document.getElementById('mob-bar');
  bar.classList.toggle('visible', n > 0);
  document.getElementById('mob-count').textContent = `${n} selected`;
}

/* ── Delete ── */
async function deleteSelected() {
  if (!S.selected.size) return;
  const ids = [...S.selected];
  if (!confirm(`Permanently delete ${ids.length} file${ids.length > 1 ? 's' : ''} from disk?\nThis cannot be undone.`)) return;

  try {
    const r = await fetch('/api/discard', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ ids }),
    }).then(r => r.json());

    toast(`Deleted ${r.deleted} of ${r.total} file${r.total > 1 ? 's' : ''}`);
    ids.forEach(id => document.querySelector(`.card[data-id="${id}"]`)?.remove());
    S.files  = S.files.filter(f => !ids.includes(f.id));
    S.total -= ids.length;
    S.selected.clear();

    const meta  = document.getElementById('grid-meta');
    const start = (S.page - 1) * S.perPage + 1;
    const end   = start + S.files.length - 1;
    meta.textContent = S.files.length ? `Showing ${start}–${end} of ${S.total.toLocaleString()} files` : '';
    if (!S.files.length) load();
    renderPagination();
    syncUI();
  } catch { toast('Delete failed — check server logs'); }
}

/* ── Pagination ── */
function renderPagination() {
  const pages = Math.ceil(S.total / S.perPage);
  const pag = document.getElementById('pagination');
  pag.innerHTML = '';
  if (pages <= 1) return;

  const mkBtn = (label, page, primary) => {
    const b = document.createElement('button');
    b.className = 'btn' + (primary ? ' btn-primary' : '');
    b.textContent = label; b.disabled = page < 1 || page > pages;
    b.onclick = () => { S.page = page; S.selected.clear(); load(); scrollTo(0, 0); };
    return b;
  };
  pag.appendChild(mkBtn('← Prev', S.page - 1, false));
  const lbl = document.createElement('span');
  lbl.className = 'page-label'; lbl.textContent = `Page ${S.page} of ${pages}`;
  pag.appendChild(lbl);
  pag.appendChild(mkBtn('Next →', S.page + 1, true));
}

/* ── Helpers ── */
function toast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 3200);
}
function fmtSize(b) {
  if (!b) return '';
  const u = ['B','KB','MB','GB'], i = Math.min(Math.floor(Math.log(b) / Math.log(1024)), 3);
  return (b / 1024**i).toFixed(i ? 1 : 0) + ' ' + u[i];
}

  mp3:'🎵', flac:'🎵', ogg:'🎵', wav:'🎵',
  zip:'🗜', rar:'🗜', '7z':'🗜',
  doc:'📝', docx:'📝', xls:'📊', xlsx:'📊',
