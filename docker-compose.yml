services:
  tg-downloader:
    build: .
    container_name: tg-downloader
    restart: always
    environment:
      - CUDA_VISIBLE_DEVICES=        # no NVIDIA GPU on Pi; prevents PyTorch CUDA probe/segfault
    volumes:
      - ./config.yaml:/app/config.yaml:ro
      - ./data:/app/data
      - /srv/share/tg-downloads:/srv/share/tg-downloads
    stdin_open: true
    tty: true

  webui:
    build:
      context: .
      dockerfile: webui/Dockerfile
    container_name: tg-webui
    restart: always
    environment:
      - CUDA_VISIBLE_DEVICES=
    ports:
      - "8090:8080"
    volumes:
      - ./data:/app/data
      - /srv/share/tg-downloads:/srv/share/tg-downloads
